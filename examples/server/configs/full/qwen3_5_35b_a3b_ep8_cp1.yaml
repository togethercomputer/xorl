# EP=8, CP=1 — isolate whether CP causes logprob divergence
model_path: Qwen/Qwen3.5-35B-A3B
tokenizer_path: Qwen/Qwen3.5-35B-A3B
attn_implementation: flash_attention_3
moe_implementation: quack
ep_dispatch: deepep

data_parallel_mode: fsdp2
expert_parallel_size: 8
ulysses_parallel_size: 1
data_parallel_replicate_size: 1
data_parallel_shard_size: 1

enable_mixed_precision: true
enable_gradient_checkpointing: true
enable_full_shard: true
enable_activation_offload: false
init_device: meta
load_weights_mode: all_ranks

output_dir: outputs/Qwen3.5-35B-A3B-server-ep8-cp1
load_checkpoint_path: ""
ckpt_manager: dcp

log_level: INFO

worker_connection_timeout: 60.0
worker_max_retries: 3

sample_packing_sequence_len: 128000
enable_packing: true

skip_initial_checkpoint: true
ce_mode: compiled

optimizer: muon
optimizer_dtype: bf16
muon_lr: 0.02
muon_momentum: 0.95
muon_adjust_lr_fn: match_rms_adamw
