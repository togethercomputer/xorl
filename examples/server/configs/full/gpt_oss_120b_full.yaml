# Server-side configuration for XORL Training Server (GPT-OSS 120B full weights, bf16)
#
# Full weight RL fine-tuning of the 120B MoE model.
# 8 GPUs: EP=8, FSDP shard=8. Muon optimizer (1 state) fits in GPU memory.
# Uses native backend (torch._grouped_mm) with alltoall EP dispatch.

model_path: unsloth/gpt-oss-120b-BF16
tokenizer_path: unsloth/gpt-oss-120b-BF16
attn_implementation: eager
moe_implementation: native
ep_dispatch: alltoall
train_router: false

data_parallel_mode: fsdp2
expert_parallel_size: 8
ulysses_parallel_size: 1
data_parallel_replicate_size: 1
data_parallel_shard_size: 8

enable_mixed_precision: true
enable_gradient_checkpointing: true
enable_full_shard: true
enable_activation_offload: false
init_device: meta
load_weights_mode: all_ranks

output_dir: outputs/gpt-oss-120b-server-full-rl
load_checkpoint_path: ""
ckpt_manager: dcp

log_level: INFO

worker_connection_timeout: 60.0
worker_max_retries: 3

sample_packing_sequence_len: 32000
enable_packing: true

skip_initial_checkpoint: true

optimizer: muon
optimizer_dtype: bf16
muon_lr: 0.02
muon_momentum: 0.95
muon_adjust_lr_fn: match_rms_adamw
