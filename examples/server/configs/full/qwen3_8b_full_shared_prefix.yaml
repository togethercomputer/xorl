# Server config for XORL Training Server (Qwen3-8B full weights, bf16) with
# shared-prefix attention enabled. For GRPO/DAPO rollouts that sample multiple
# responses per shared prompt, this dedups the prompt in the policy-update
# forward (computes its KV once). Auto-detects shared-prefix groups from each
# packed micro-batch; a no-op when no prompt is shared. Composes with Ulysses SP.

# Model Configuration
model_path: Qwen/Qwen3-8B
tokenizer_path: Qwen/Qwen3-8B
attn_implementation: flash_attention_3

# Parallelism Configuration
data_parallel_mode: fsdp2
ulysses_parallel_size: 1   # shared-prefix composes with Ulysses (>1); not with ring attention
data_parallel_replicate_size: 1
data_parallel_shard_size: 4

# Memory & Performance
enable_mixed_precision: true
enable_gradient_checkpointing: true
enable_full_shard: true
enable_activation_offload: false
init_device: meta

# Shared-prefix attention
use_shared_prefix: true

# Checkpointing
output_dir: outputs/Qwen3-8B-server-full-shared-prefix
load_checkpoint_path: ""
ckpt_manager: dcp

# Logging
log_level: INFO

# Worker Configuration
worker_connection_timeout: 60.0
worker_max_retries: 3

# Data Processing Configuration
sample_packing_sequence_len: 128000
enable_packing: true

# Full weight training
skip_initial_checkpoint: true
ce_mode: compiled
