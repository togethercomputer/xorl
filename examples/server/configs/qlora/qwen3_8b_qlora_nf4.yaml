# Server-side configuration for XORL Training Server (Qwen3-8B QLoRA NF4)
#
# NF4 quantizes bf16 weights on-the-fly — no pre-quantized checkpoint needed.
# Uses a standard bf16 checkpoint (e.g., Qwen/Qwen3-8B).
# ~4x weight memory savings vs bf16 with information-theoretically optimal
# 4-bit quantization for normally distributed weights.

# Model Configuration
model_path: Qwen/Qwen3-8B
tokenizer_path: Qwen/Qwen3-8B
attn_implementation: flash_attention_3

# Parallelism Configuration
data_parallel_mode: fsdp2
ulysses_parallel_size: 1
data_parallel_replicate_size: 1
data_parallel_shard_size: 4

# Memory & Performance
enable_mixed_precision: true
enable_gradient_checkpointing: true
enable_full_shard: true
enable_activation_offload: false
init_device: meta

# Checkpointing
output_dir: outputs/Qwen3-8B-server-qlora-nf4-test
load_checkpoint_path: ""
ckpt_manager: dcp

# Logging
log_level: INFO

# Worker Configuration
worker_connection_timeout: 60.0
worker_max_retries: 3

# Data Processing Configuration
sample_packing_sequence_len: 128000
enable_packing: true

# QLoRA Configuration
enable_qlora: true
quant_format: nf4
quant_group_size: 64
enable_lora: true
lora_rank: 32
lora_alpha: 32
lora_target_modules: ["qkv_proj", "o_proj", "gate_up_proj", "down_proj"]

# Skip initial checkpoint
skip_initial_checkpoint: true
ce_mode: compiled
