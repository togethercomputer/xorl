# Qwen3-1.7B 2-GPU FSDP2 twin of qwen3_8b.yaml — for the whole-step graph-break census.
# Graph breaks are structural per-rank, so 2-way FSDP2 reproduces the same FSDP-hook breaks
# as 8-way; this is the small, fast iteration target for "get to 0 graph breaks".
# Matches the 8B regime: fsdp2, flash_attention_3, gradient checkpointing on, meta-init.
model:
  model_path: Qwen/Qwen3-1.7B
  attn_implementation: flash_attention_3

data:
  datasets:
    - path: dummy
      type: tokenized
      max_seq_len: 4096
  select_columns: [input_ids, labels]
  dataset_prepared_path: last_prepared_dataset
  sample_packing_method: sequential
  sample_packing_sequence_len: 4096
  dataloader_num_workers: 2
  dataloader_prefetch_factor: 2
  dataloader_pin_memory: true

train:
  output_dir: outputs/Qwen3-1.7B-ws2
  data_parallel_mode: fsdp2
  ulysses_parallel_size: 1
  data_parallel_replicate_size: 1
  data_parallel_shard_size: 2
  expert_parallel_size: 1
  tensor_parallel_size: 1
  # Keep params unsharded through backward: avoids FSDP's backward re-all-gather, whose
  # lazily-allocated output buffer trips "data is not allocated yet" in the compiled-autograd
  # Inductor backward for the whole-step capture. (Default None → True → reshard+re-gather.)
  reshard_after_forward: false

  num_train_epochs: 1
  max_steps: 3

  micro_batch_size: 1
  gradient_accumulation_steps: 2   # mb1 = eager warmup, mb2 = first compiled call (census fires)

  optimizer: adamw
  lr: 1.0e-5
  lr_warmup_ratio: 0.0
  lr_decay_style: constant
  weight_decay: 0.01
  max_grad_norm: 1.0

  enable_mixed_precision: true
  enable_compile: false            # whole-step owns compilation; avoid per-layer double-compile
  # OFF for the whole-step + compiled-autograd path: eager torch.utils.checkpoint's unpack_hook
  # is un-traceable under the fullgraph compiled-autograd backward (gb0007). Under one fused graph
  # the AOT min-cut partitioner does its own recompute, so layer checkpointing is not needed here.
  enable_gradient_checkpointing: false
  enable_full_shard: true
  enable_activation_offload: false
  init_device: meta
  load_weights_mode: grouped
  enable_full_determinism: false
  ckpt_manager: dcp
  save_steps: 0
  save_hf_weights: false

  enable_profiling: false
  use_wandb: false
  wandb_project: local-training
  wandb_name: Qwen3-1.7B-ws2
