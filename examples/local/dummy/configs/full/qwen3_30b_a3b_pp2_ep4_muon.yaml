model:
  model_path: Qwen/Qwen3-30B-A3B
  attn_implementation: flash_attention_3
  moe_implementation: triton

data:
  datasets:
    - path: dummy
      type: tokenized
      max_seq_len: 4096
  select_columns: [input_ids, labels]
  dataset_prepared_path: last_prepared_dataset
  sample_packing_method: sequential
  sample_packing_sequence_len: 8192
  dataloader_num_workers: 4
  dataloader_prefetch_factor: 2
  dataloader_pin_memory: true

train:
  output_dir: outputs/Qwen3-30B-A3B-bench-pp2-ep4-muon
  data_parallel_mode: fsdp2
  pipeline_parallel_size: 2
  ulysses_parallel_size: 1
  ringattn_parallel_size: 1
  data_parallel_replicate_size: 1
  data_parallel_shard_size: 4
  expert_parallel_size: 4

  num_train_epochs: 5
  max_steps: 10

  micro_batch_size: 1
  gradient_accumulation_steps: 4

  optimizer: muon
  muon_lr: 1.0e-4
  lr: 1.0e-5
  lr_warmup_ratio: 0.001
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01

  max_grad_norm: 5.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: meta
  load_weights_mode: broadcast
  enable_full_determinism: false
  empty_cache_steps: 500
  ckpt_manager: dcp
  save_steps: 0
  save_hf_weights: false

  use_wandb: false
