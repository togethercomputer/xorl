model:
  model_path: Qwen/Qwen3-Coder-30B-A3B-Instruct
  attn_implementation: flash_attention_3
  moe_implementation: quack
  ep_dispatch: deepep
  train_router: false
  deepep_buffer_size_gb: 2.0
  deepep_num_sms: 48

data:
  datasets:
    - path: dummy
      type: tokenized
      max_seq_len: 16000
  select_columns: [input_ids, labels]
  dataset_prepared_path: last_prepared_dataset
  sample_packing_method: sequential
  sample_packing_sequence_len: 128000
  dataloader_num_workers: 4
  dataloader_prefetch_factor: 2
  dataloader_pin_memory: true

train:
  output_dir: outputs/Qwen3-Coder-30B-A3B-local-test
  data_parallel_mode: fsdp2
  ulysses_parallel_size: 8
  expert_parallel_size: 8
  data_parallel_replicate_size: 1
  data_parallel_shard_size: 1

  num_train_epochs: 5
  max_steps: 1000

  # batch size
  micro_batch_size: 1
  gradient_accumulation_steps: 1
  empty_cache_steps: 100

  optimizer: muon
  # lr and warmup
  muon_lr: 1.0e-4
  lr: 1.0e-5
  lr_warmup_ratio: 0.005
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01

  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  enable_activation_offload: false
  init_device: meta
  load_weights_mode: all_ranks
  enable_full_determinism: false

  ckpt_manager: dcp
  save_steps: 1000
  save_hf_weights: true

  # wandb
  use_wandb: false
  wandb_project: together-coder-local-training
  wandb_name: Qwen3-Coder-30B-A3B-local-test-dummy-mbs1-ga1-lr1e-5-wd0.01
