model:
  model_path: Qwen/Qwen3-Coder-30B-A3B-Instruct
  attn_implementation: flash_attention_3

data:
  datasets:
    - path: togethercomputer/CoderForge-Preview
      name: trajectories-tokenized_qwencoder
      split: R2E_Gym
      type: tokenized
      max_seq_len: 128000
  select_columns: [input_ids, labels]
  sample_packing_method: sequential
  sample_packing_sequence_len: 160000
  dataloader_num_workers: 4
  dataloader_pin_memory: false
  pad_to_multiple_of: 4096

train:
  output_dir: outputs/timing_test_30b
  data_parallel_mode: fsdp2
  ulysses_parallel_size: 8
  expert_parallel_size: 8
  data_parallel_replicate_size: 1
  data_parallel_shard_size: 1

  num_train_epochs: 1
  max_steps: 2

  micro_batch_size: 1
  gradient_accumulation_steps: 1

  optimizer: adamw
  lr: 1.0e-5
  lr_warmup_ratio: 0.005
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01

  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  enable_activation_offload: false
  init_device: meta
  load_weights_mode: all_ranks
  enable_full_determinism: false
  empty_cache_steps: 500
  save_hf_weights: false
  use_wandb: false
  ckpt_manager: dcp
