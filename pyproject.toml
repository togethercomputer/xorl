[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project.urls]
"Homepage" = "https://github.com/xorl-org/xorl"
"Source Code" = "https://github.com/xorl-org/xorl"

[project]
name = "xorl"
dynamic = ["version"]
description = "Xorl: Simple and high-performance distributed training framework for large language models"
requires-python = ">=3.10"

dependencies = [
  "blobfile>=3.0.0",
  "boto3>=1.35.0",
  "datasets>=4.4.0",
  "packaging>=23.0,<26.0",
  "tenacity>=8.0.0",
  "torchdata>=0.8.0,<1.0",
  "tiktoken>=0.9.0",
  "diffusers>=0.30.0,<=0.31.0",
  "transformers[torch]>=4.51.3,<4.57.0",
  "psutil",
  "timm",
  "wandb",
  "einops",
  "safetensors",
  "numba",
  "pyarrow",
  "pydantic",
  "debugpy",
  "uvicorn",
  "pyzmq",
  "msgpack",
  "fastapi",
  "peft",
]

[project.optional-dependencies]
# TODO: Delete this after we switch to uv to run CI tasks.
dev = [
  "pre-commit>=4.0.0,<5.0",
  "ruff>=0.7.0,<1.0",
  "pytest>=6.0.0,<8.0",
  "expecttest>=0.3.0,<0.4"
]
gpu =[
  "torch==2.8.0+cu128",
  "torchvision",
  "torchaudio",
  "liger-kernel",
  "flash-attn",
]
# Dedicated endpoint integration (for Together AI dedicated endpoints)
dedicated-endpoint = [
  "together>=1.0.0",
  "huggingface_hub>=0.20.0",
]
# Serverless inference (for Together AI serverless LoRA inference)
serverless = [
  "huggingface_hub>=0.20.0",
]


[dependency-groups]
# Follow the best practice in https://docs.astral.sh/uv/concepts/projects/dependencies/#development-dependencies
# to manage dev dependencies (i.e., dependencies that are only used in development) like
# test, lint and doc tools.
dev = [
  {include-group = "lint"},
  {include-group = "test"},
]
lint = [
  "pre-commit",
  "ruff",
]
test = [
  "pytest",
  "expecttest"
]


[tool.uv]
# This locks the uv version so that we have a consistent uv behavior across the board.
# Inconsistent uv versions might generate different uv lock files which creates chaos.
#
# NOTE 1: Update this at least once per month as uv releases new version every week.
# NOTE 2: When updating this line, make sure to update Dockerfile under docker/ to the same
#         version and release new docker images.
required-version = ">=0.8.14"


[tool.setuptools.dynamic]
version = {attr = "xorl.__version__"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py38"
line-length = 120
indent-width = 4

[tool.ruff.lint]
ignore = ["C901", "E501", "E741", "W605", "C408"]
select = ["C", "E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401", "F403", "F811"]

[tool.ruff.lint.isort]
lines-after-imports = 2
known-first-party = ["xorl"]
known-third-party = ["torch", "transformers", "vescale", "wandb"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
markers = [
    "cpu: marks tests as CPU-only tests (deselect with '-m \"not cpu\"')",
    "gpu: marks tests as GPU-required tests (deselect with '-m \"not gpu\"')",
]
filterwarnings = [
    "ignore::DeprecationWarning:multiprocessing.popen_fork",
    "ignore:The argument 'device' of Tensor:DeprecationWarning",
]
