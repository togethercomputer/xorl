<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#888"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#27ae60"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f39c12"/></marker>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .title { font-size: 11px; fill: #999; letter-spacing: 2px; }
    .box-title { font-size: 15px; font-weight: bold; }
    .box-sub { font-size: 12px; fill: #555; }
    .box-detail { font-size: 10px; fill: #777; }
    .code { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 10px; fill: #555; }
    .badge { font-size: 9px; font-weight: bold; fill: white; }
    .gpu-label { font-size: 9px; fill: #555; }
    .loop-label { font-size: 8.5px; fill: #aaa; }
    .step { font-size: 10px; font-weight: bold; fill: white; }
    .step-label { font-size: 8px; fill: #777; }
  </style>

  <text x="360" y="16" text-anchor="middle" class="title">THE RL LOOP</text>

  <!-- ==================== ROW 1: Orchestrator (y=28..100) ==================== -->
  <rect x="110" y="28" width="500" height="72" rx="10" fill="#f0e6ff" stroke="#9b59b6" stroke-width="2"/>
  <text x="360" y="52" text-anchor="middle" class="box-title" fill="#333">Your RL Orchestrator</text>
  <text x="360" y="69" text-anchor="middle" class="box-detail" fill="#666">Reward model · Code sandbox · Math verifier · Rule-based scorer</text>
  <rect x="315" y="78" width="90" height="17" rx="3" fill="#9b59b6"/>
  <text x="360" y="90" text-anchor="middle" class="badge">YOU BUILD THIS</text>

  <!-- ==================== ARROWS: Orchestrator(bottom=100) -> Clients(top=190) ==================== -->
  <line x1="230" y1="100" x2="230" y2="183" stroke="#888" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="490" y1="100" x2="490" y2="183" stroke="#888" stroke-width="1.5" marker-end="url(#ad)"/>

  <circle cx="270" cy="135" r="10" fill="#3498db"/>
  <text x="270" y="139" text-anchor="middle" class="step">1</text>
  <text x="270" y="157" text-anchor="middle" class="step-label">scored rollouts</text>

  <circle cx="530" cy="135" r="10" fill="#3498db"/>
  <text x="530" y="139" text-anchor="middle" class="step">2</text>
  <text x="530" y="157" text-anchor="middle" class="step-label">prompts</text>

  <!-- ==================== ROW 2: xorl_client boxes (y=190..270) ==================== -->
  <rect x="110" y="190" width="240" height="80" rx="8" fill="#eef6ff" stroke="#3498db" stroke-width="2"/>
  <text x="230" y="212" text-anchor="middle" class="box-title" fill="#2980b9">xorl_client</text>
  <text x="230" y="229" text-anchor="middle" class="code">.forward_backward()</text>
  <text x="230" y="243" text-anchor="middle" class="code">.optim_step()</text>
  <text x="230" y="257" text-anchor="middle" class="code">.save_state()</text>

  <rect x="370" y="190" width="240" height="80" rx="8" fill="#eef6ff" stroke="#3498db" stroke-width="2"/>
  <text x="490" y="212" text-anchor="middle" class="box-title" fill="#2980b9">xorl_client</text>
  <text x="490" y="229" text-anchor="middle" class="code">.sample()</text>
  <text x="490" y="243" text-anchor="middle" class="code">.batch_sample()</text>
  <text x="490" y="257" text-anchor="middle" class="code">logprobs + routing data</text>

  <!-- ==================== ARROWS: Clients(bottom=270) -> Servers(top=350) ==================== -->
  <line x1="230" y1="270" x2="230" y2="343" stroke="#888" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="490" y1="270" x2="490" y2="343" stroke="#888" stroke-width="1.5" marker-end="url(#ad)"/>

  <circle cx="270" cy="300" r="10" fill="#27ae60"/>
  <text x="270" y="304" text-anchor="middle" class="step">3</text>
  <text x="270" y="322" text-anchor="middle" class="step-label">HTTP :5555</text>

  <circle cx="530" cy="300" r="10" fill="#f39c12"/>
  <text x="530" y="304" text-anchor="middle" class="step">4</text>
  <text x="530" y="322" text-anchor="middle" class="step-label">HTTP :30000</text>

  <!-- ==================== ROW 3: Server boxes (y=350..450) ==================== -->
  <rect x="110" y="350" width="240" height="100" rx="10" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="230" y="374" text-anchor="middle" class="box-title" fill="#1e8449">xorl</text>
  <text x="230" y="391" text-anchor="middle" class="box-sub">Training Server</text>
  <text x="230" y="409" text-anchor="middle" class="box-detail">FastAPI → ZMQ → NCCL</text>
  <text x="230" y="424" text-anchor="middle" class="box-detail">FSDP2 · TP · EP · PP</text>
  <rect x="185" y="431" width="90" height="14" rx="3" fill="#d5f5e3"/>
  <text x="230" y="442" text-anchor="middle" class="gpu-label">GPU 0,1,2,3</text>

  <rect x="370" y="350" width="240" height="100" rx="10" fill="#fff8e8" stroke="#f39c12" stroke-width="2"/>
  <text x="490" y="374" text-anchor="middle" class="box-title" fill="#d68910">xorl-sglang</text>
  <text x="490" y="391" text-anchor="middle" class="box-sub">Inference Server</text>
  <text x="490" y="409" text-anchor="middle" class="box-detail">SGLang fork</text>
  <text x="490" y="424" text-anchor="middle" class="box-detail">FP8 · TP · Continuous batching</text>
  <rect x="445" y="431" width="90" height="14" rx="3" fill="#fef9e7"/>
  <text x="490" y="442" text-anchor="middle" class="gpu-label">GPU 4,5,6,7</text>

  <!-- ==================== NCCL Weight Sync (y=472) ==================== -->
  <!-- Single green arrow: training server -> inference server -->
  <line x1="150" y1="472" x2="305" y2="472" stroke="#27ae60" stroke-width="2.5"/>
  <line x1="415" y1="472" x2="570" y2="472" stroke="#27ae60" stroke-width="2.5" marker-end="url(#ag)"/>

  <!-- Center label -->
  <rect x="305" y="462" width="110" height="22" rx="5" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="360" y="477" text-anchor="middle" style="font-size:9px;font-weight:bold;fill:#555;">NCCL Weight Sync</text>

  <!-- Step 5 -->
  <circle cx="360" cy="500" r="10" fill="#e74c3c"/>
  <text x="360" y="504" text-anchor="middle" class="step">5</text>

  <!-- ==================== Loop: single continuous path around the outside ==================== -->
  <!-- Arrow marker for the loop -->
  <defs>
    <marker id="aloop" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#bbb"/></marker>
  </defs>
  <!-- Continuous loop: starts at inference (bottom-right), goes up right side,
       across the top, down the left side, ends at training (bottom-left) -->
  <path d="M 610,450
           C 610,460 650,460 650,450
           L 650,38
           C 650,18 640,18 610,18
           L 110,18
           C 80,18 70,18 70,38
           L 70,450
           C 70,460 80,460 110,450"
        fill="none" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#aloop)"/>

  <!-- Label on right side (going up: rollouts flow from inference to orchestrator) -->
  <text x="664" y="300" text-anchor="middle" class="loop-label" transform="rotate(90, 664, 300)">rollouts + logprobs ▲</text>
  <!-- Label on left side (going down: updated policy flows to training) -->
  <text x="56" y="300" text-anchor="middle" class="loop-label" transform="rotate(-90, 56, 300)">▼ train with updated policy</text>
</svg>
